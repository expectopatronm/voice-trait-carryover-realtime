<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Voice Trait Carryover Flow</title>
  <desc id="desc">A dark flowchart showing direct speech adaptation and the tool-interrupted carryover path.</desc>
  <rect width="1400" height="900" fill="#050505"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ffffff"/>
    </marker>
    <style>
      .box { fill:#111111; stroke:#ffffff; stroke-width:2.2; rx:14; }
      .decision { fill:#111111; stroke:#ffffff; stroke-width:2.2; }
      .text { fill:#ffffff; font-family:Inter, Segoe UI, Arial, sans-serif; font-size:25px; font-weight:600; text-anchor:middle; dominant-baseline:middle; }
      .small { font-size:21px; font-weight:500; }
      .tiny { font-size:18px; font-weight:500; }
      .label { fill:#ffffff; font-family:Inter, Segoe UI, Arial, sans-serif; font-size:20px; font-weight:700; text-anchor:middle; }
      .line { stroke:#ffffff; stroke-width:2.6; fill:none; marker-end:url(#arrow); }
      .muted { stroke:#bdbdbd; }
    </style>
  </defs>

  <text class="text" x="700" y="48">Voice Trait Carryover at a Tool Boundary</text>

  <rect class="box" x="440" y="86" width="520" height="76"/>
  <text class="text small" x="700" y="124">Latest spoken user turn</text>

  <path class="line" d="M700 162 L700 198"/>
  <rect class="box" x="390" y="198" width="620" height="88"/>
  <text class="text small" x="700" y="229">Extract response-relevant speech traits</text>
  <text class="text tiny" x="700" y="258">language, register, affect, prosody, tempo, articulation</text>

  <path class="line" d="M700 286 L700 328"/>
  <polygon class="decision" points="700,328 965,420 700,512 435,420"/>
  <text class="text small" x="700" y="407">Does the answer need</text>
  <text class="text small" x="700" y="438">a domain tool?</text>

  <path class="line" d="M520 475 L360 548"/>
  <text class="label" x="408" y="502">No</text>
  <rect class="box" x="100" y="548" width="520" height="98"/>
  <text class="text small" x="360" y="585">Respond directly</text>
  <text class="text tiny" x="360" y="616">using the extracted traits</text>

  <path class="line" d="M880 475 L1040 548"/>
  <text class="label" x="992" y="502">Yes</text>
  <rect class="box" x="780" y="548" width="520" height="98"/>
  <text class="text small" x="1040" y="582">Emit carryover tool first</text>
  <text class="text tiny" x="1040" y="615">in the same batch as domain tools</text>

  <path class="line" d="M1040 646 L1040 686"/>
  <rect class="box" x="760" y="686" width="560" height="112"/>
  <text class="text tiny" x="1040" y="724">store_voice_traits_summary_and_response</text>
  <text class="text tiny" x="1040" y="753">extracted_traits_summary</text>
  <text class="text tiny" x="1040" y="779">response_to_extracted_traits_summary</text>

  <path class="line" d="M360 646 L360 738 L565 738"/>
  <path class="line" d="M760 742 L640 742"/>
  <rect class="box" x="565" y="694" width="160" height="96"/>
  <text class="text tiny" x="645" y="728">Protocol</text>
  <text class="text tiny" x="645" y="754">echo</text>

  <path class="line" d="M1040 548 L1040 505 L1180 505 L1180 686"/>
  <rect class="box" x="1120" y="686" width="210" height="112"/>
  <text class="text tiny" x="1225" y="728">Domain</text>
  <text class="text tiny" x="1225" y="754">results</text>

  <path class="line" d="M645 790 L645 822 L700 822 L700 844"/>
  <path class="line" d="M1225 798 L1225 822 L760 822 L760 844"/>
  <rect class="box" x="455" y="844" width="490" height="46"/>
  <text class="text tiny" x="700" y="867">Final spoken answer preserves adaptation</text>
</svg>
